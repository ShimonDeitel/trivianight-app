name: Trivianight
options:
  bundleIdPrefix: com.shimondeitel.trivialog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Trivianight:
    type: application
    platform: iOS
    sources:
      - path: Trivianight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trivialog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Trivianight/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  TrivianightTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TrivianightTests
      - path: Trivianight.storekit
    dependencies:
      - target: Trivianight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trivialog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  TrivianightUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: TrivianightUITests
    dependencies:
      - target: Trivianight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.trivialog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Trivianight:
    build:
      targets:
        Trivianight: all
        TrivianightTests: [test]
        TrivianightUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Trivianight.storekit
    test:
      config: Debug
      storeKitConfiguration: Trivianight.storekit
      targets:
        - TrivianightTests
        - TrivianightUITests
    archive:
      config: Release
